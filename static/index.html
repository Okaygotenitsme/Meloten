<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptHost</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 32px 16px 60px;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 36px;
  }

  .site-name {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }

  .site-name span {
    color: #5b8cff;
  }

  .tagline {
    color: #555;
    font-size: 13px;
    margin-top: 4px;
  }

  .card {
    background: #181818;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 13px;
    color: #aaa;
    margin-bottom: 6px;
    margin-top: 14px;
  }

  label:first-of-type { margin-top: 0; }

  input[type="text"],
  input[type="password"],
  textarea {
    width: 100%;
    background: #111;
    border: 1px solid #2e2e2e;
    border-radius: 7px;
    color: #e0e0e0;
    font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, textarea:focus {
    border-color: #5b8cff;
  }

  textarea {
    min-height: 220px;
    resize: vertical;
    line-height: 1.6;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    cursor: pointer;
    user-select: none;
  }

  .toggle-box {
    width: 36px;
    height: 20px;
    background: #222;
    border: 1px solid #333;
    border-radius: 10px;
    position: relative;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
  }

  .toggle-box::after {
    content: '';
    position: absolute;
    left: 3px;
    top: 3px;
    width: 12px;
    height: 12px;
    background: #555;
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }

  .toggle-row.active .toggle-box {
    background: #1a2e5a;
    border-color: #5b8cff;
  }

  .toggle-row.active .toggle-box::after {
    background: #5b8cff;
    transform: translateX(16px);
  }

  .toggle-row input { display: none; }

  .toggle-label {
    font-size: 13px;
    color: #ccc;
  }

  #pwField { display: none; margin-top: 14px; }

  .btn-upload {
    width: 100%;
    padding: 12px;
    background: #5b8cff;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.15s, opacity 0.15s;
  }

  .btn-upload:hover { background: #4a7af0; }
  .btn-upload:disabled { opacity: 0.4; cursor: not-allowed; background: #5b8cff; }

  .error-msg {
    color: #f87171;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }

  .result-box {
    background: #181818;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 16px;
    display: none;
  }

  .result-title {
    font-size: 14px;
    font-weight: 600;
    color: #6ee7b7;
    margin-bottom: 18px;
  }

  .url-label {
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
  }

  .url-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .url-box {
    flex: 1;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 9px 12px;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 12px;
    color: #aaa;
    word-break: break-all;
    cursor: pointer;
  }

  .url-box.ls { color: #93c5fd; }

  .copy-btn {
    padding: 9px 14px;
    background: #222;
    border: 1px solid #333;
    border-radius: 6px;
    color: #aaa;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }

  .copy-btn:hover { background: #2a2a2a; color: #fff; }
  .copy-btn.copied { background: #1a3a2a; border-color: #4ade80; color: #4ade80; }

  .divider {
    border: none;
    border-top: 1px solid #222;
    margin: 14px 0;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="site-name">Script<span>Host</span></div>
    <div class="tagline">Host your Roblox scripts for free</div>
  </header>

  <div class="card">
    <div class="card-title">Upload Script</div>

    <label>Script Name</label>
    <input type="text" id="titleInput" placeholder="Untitled Script" />

    <label>Lua Code</label>
    <textarea id="codeArea" placeholder="-- paste your script here&#10;print('hello world')"></textarea>

    <label class="toggle-row" id="pwToggle">
      <input type="checkbox" id="pwCheck">
      <div class="toggle-box"></div>
      <span class="toggle-label">Password protect</span>
    </label>
    <div id="pwField">
      <label>Password</label>
      <input type="password" id="pwInput" placeholder="Enter password..." />
    </div>

    <label class="toggle-row" id="asToggle">
      <input type="checkbox" id="asCheck">
      <div class="toggle-box"></div>
      <span class="toggle-label">Anti-Skid (hides source code from others)</span>
    </label>

    <button class="btn-upload" id="uploadBtn" onclick="uploadScript()">Upload Script</button>
    <div class="error-msg" id="errMsg"></div>
  </div>

  <div class="result-box" id="resultCard">
    <div class="result-title">Script uploaded successfully</div>

    <div class="url-label">View Page</div>
    <div class="url-row">
      <div class="url-box" id="viewUrl" onclick="window.open(this.dataset.href,'_blank')" style="cursor:pointer"></div>
      <button class="copy-btn" id="btn-view" onclick="copyAndMark('viewUrl','btn-view')">Copy</button>
    </div>

    <div id="rawRow">
      <div class="url-label">Raw URL</div>
      <div class="url-row">
        <div class="url-box" id="rawUrl"></div>
        <button class="copy-btn" id="btn-raw" onclick="copyAndMark('rawUrl','btn-raw')">Copy</button>
      </div>
    </div>

    <hr class="divider">

    <div class="url-label">Loadstring</div>
    <div class="url-row">
      <div class="url-box ls" id="lsCode"></div>
      <button class="copy-btn" id="btn-ls" onclick="copyAndMark('lsCode','btn-ls')">Copy</button>
    </div>
  </div>

</div>

<script>
const pwToggle = document.getElementById('pwToggle');
const pwCheck = document.getElementById('pwCheck');
const asToggle = document.getElementById('asToggle');
const asCheck = document.getElementById('asCheck');

pwToggle.addEventListener('click', () => {
  pwCheck.checked = !pwCheck.checked;
  pwToggle.classList.toggle('active', pwCheck.checked);
  document.getElementById('pwField').style.display = pwCheck.checked ? 'block' : 'none';
});

asToggle.addEventListener('click', () => {
  asCheck.checked = !asCheck.checked;
  asToggle.classList.toggle('active', asCheck.checked);
});

async function uploadScript() {
  const btn = document.getElementById('uploadBtn');
  const err = document.getElementById('errMsg');
  err.style.display = 'none';

  const code = document.getElementById('codeArea').value.trim();
  const title = document.getElementById('titleInput').value.trim() || 'Untitled Script';
  const password = pwCheck.checked ? document.getElementById('pwInput').value : '';
  const anti_skid = asCheck.checked;

  if (!code) { showError('Paste your script first.'); return; }

  btn.disabled = true;
  btn.textContent = 'Uploading...';

  try {
    const res = await fetch('/api/upload', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code, title, password, anti_skid})
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Something went wrong.'); return; }

    const base = window.location.origin;
    const viewFull = base + data.view_url;
    const lsTarget = anti_skid ? viewFull : (base + data.raw_url);
    const ls = `loadstring(game:HttpGet("${lsTarget}"))()`;

    const viewEl = document.getElementById('viewUrl');
    viewEl.textContent = viewFull;
    viewEl.dataset.href = viewFull;

    const rawRow = document.getElementById('rawRow');
    if (anti_skid) {
      rawRow.style.display = 'none';
    } else {
      rawRow.style.display = 'block';
      document.getElementById('rawUrl').textContent = base + data.raw_url;
    }

    document.getElementById('lsCode').textContent = ls;

    const card = document.getElementById('resultCard');
    card.style.display = 'block';
    card.scrollIntoView({behavior: 'smooth', block: 'nearest'});
  } catch(e) {
    showError('Network error, try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Upload Script';
  }
}

function copyAndMark(elId, btnId) {
  const text = document.getElementById(elId).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

function showError(msg) {
  const err = document.getElementById('errMsg');
  err.textContent = msg;
  err.style.display = 'block';
  const btn = document.getElementById('uploadBtn');
  btn.disabled = false;
  btn.textContent = 'Upload Script';
}
</script>
</body>
</html>
